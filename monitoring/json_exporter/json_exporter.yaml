modules:
  default:
    metrics:
      - name: bme680_humidity
        path: '{.bme680_humidity}'
        help: "Humidity reading from BME680 sensor"
        labels:
          sensor: "bme680"
          unit: "percent"
      - name: hdc1080_humidity
        path: '{.hdc1080_humidity}'
        help: "Humidity reading from HDC1080 sensor"
        labels:
          sensor: "hdc1080"
          unit: "percent"
      - name: sgp40_raw
        path: '{.sgp40_raw}'
        help: "Raw gas sensor value from SGP40"
        labels:
          sensor: "sgp40"
          type: "raw"
          unit: "counts"
      - name: sgp40_compensated
        path: '{.sgp40_compensated}'
        help: "Compensated gas sensor value from SGP40"
        labels:
          sensor: "sgp40"
          type: "compensated"
          unit: "index"
      - name: bme680_temp_c
        path: '{.bme680_temp_c}'
        help: "Temperature in Celsius from BME680 sensor"
        labels:
          sensor: "bme680"
          unit: "celsius"
      - name: bme680_altitude_meters
        path: '{.bme680_altitude_meters}'
        help: "Altitude in meters calculated by BME680"
        labels:
          sensor: "bme680"
          unit: "meters"
      - name: hdc1080_temp_c
        path: '{.hdc1080_temp_c}'
        help: "Temperature in Celsius from HDC1080 sensor"
        labels:
          sensor: "hdc1080"
          unit: "celsius"
      - name: bme680_pressure_hpa
        path: '{.bme680_pressure_hpa}'
        help: "Pressure in hPa from BME680 sensor"
        labels:
          sensor: "bme680"
          unit: "hpa"
      - name: brightness
        path: '{.brightness}'
        help: "Brightness level measurement"
        labels:
          sensor: "light"
          unit: "lux"
      - name: bme680_gas_ohms
        path: '{.bme680_gas_ohms}'
        help: "Gas resistance in ohms from BME680 sensor"
        labels:
          sensor: "bme680"
          unit: "ohms"
          # Scrape configuration for Prometheus


