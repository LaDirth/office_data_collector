global:
  scrape_interval: 60s
  evaluation_interval: 60s

# Scrape configuration for Prometheus
scrape_configs:
  - job_name: 'office'
    metrics_path: /metrics
    static_configs:
      - targets: [192.168.5.57]
  - job_name: 'outside-office'
    metrics_path: /metrics
    static_configs:
      - targets: [http://192.168.7.251]